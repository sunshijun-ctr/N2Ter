    - 6
    one_line_summary: '本章主要讲述了陈友谅从一个饱受歧视的底层人物逐步崛起为乱世枭雄的过程。他参加徐寿辉起义军后，凭借权谋和手段迅速攀升，最终弑君夺位建立大汉政权。与之相对的是朱元璋的成长历程，特别是其部将常遇春在多次战役中的英勇表现。陈友谅虽然不讲道义，但极具权术和军事才能，而朱元璋则展现出卓越的战略眼光。两人之间的矛盾冲突逐渐加剧，预示着即将到来的大战。


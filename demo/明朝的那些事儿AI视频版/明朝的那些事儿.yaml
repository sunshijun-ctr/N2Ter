  - title: 第 7-8 章
    episode_num: 4
    source_chapters:
    - 7
    - 8
    one_line_summary: '在徐达、常遇春和冯胜的指挥下，朱元璋军队对汉军展开猛烈攻击，导致陈友谅战败逃回九江，胜利梦想破灭。此役汉军损失惨重，留下大量尸体与俘虏，而朱元璋则获得大量船只，为后续决战做好准备。作者分享了写作背景，表示因读者支持增加了更新频率，并解释了文中历史资料的复杂性及处理方式。同时提到为了追求真实性和通俗性，尽量用自己的语言描述历史事件。随后描写朱元璋微服私访禅寺并与住持对话的情节，展现其性格特点。最后回顾陈友谅失败后仍不断改进武器，但最终未能认识到人心的重要性，导致部下对其失去信任，士兵作战动机从理想转向生存。

      本章主要讲述了元末群雄争霸时期，陈友谅与朱元璋之间的战略博弈。洪都叛变使陈友谅震惊，他决'
  - title: 第 9 章
    episode_num: 5
    source_chapters:
    - 9
    one_line_summary: 本章主要描述了洪都之战前的兵力部署与战役爆发过程。朱文正在安排好守城将领后，面对陈友谅率领的四十万至六十万大军围困洪都，表现出严肃而悲壮的态度，在军事会议上激励众将同生共死。四月二十四日，陈友谅率先攻向抚州门，邓愈率军顽强抵抗，并利用火铳和临时木栏成功击退进攻。战斗异常惨烈，双方伤亡巨大，最终朱文正一方守住城池，但损失也极为严重。
